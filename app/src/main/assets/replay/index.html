<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Narchives Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    replay-web-page {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="/replay/ui.js"></script>
</head>
<body>
  <replay-web-page
    id="replay-viewer"
    replayBase="/replay/"
    embed="replayonly"
  ></replay-web-page>
  <script>
    // Bridge: Android calls this to set the WACZ source and URL
    function loadArchive(waczUrl, pageUrl) {
      var viewer = document.getElementById('replay-viewer');
      viewer.setAttribute('source', waczUrl);
      if (pageUrl) {
        viewer.setAttribute('url', pageUrl);
      }
    }

    // Bridge: Android calls this to get the current page HTML (for reader mode)
    function getCurrentPageHtml() {
      try {
        var iframe = document.querySelector('replay-web-page');
        if (iframe && iframe.shadowRoot) {
          var innerFrame = iframe.shadowRoot.querySelector('iframe');
          if (innerFrame && innerFrame.contentDocument) {
            return innerFrame.contentDocument.documentElement.outerHTML;
          }
        }
      } catch(e) {
        return null;
      }
      return null;
    }
  </script>
</body>
</html>
